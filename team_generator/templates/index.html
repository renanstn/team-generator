<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Generator</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/bulma.min.css') }}">
</head>

<body>
  <nav class="navbar is-warning" role="navigation">
    <div class="navbar-brand">
      <div class="navbar-item">
        <strong>Teams Generator</strong>
      </div>
    </div>
    <div class="navbar-end">
      <div class="navbar-item">
        <div class="buttons">
          <a class="button is-dark">
            Log in
          </a>
        </div>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <h1 class="title is-4">Incoming events</h1>
      <div class="columns">
        {% for evento in eventos %}
        <div class="column">
          <div class="panel">
            <div class="panel-heading">
              {{ evento.title }}
            </div>
            <div class="panel-block">
              {{ evento.data }}
            </div>
            <div class="panel-block">
              <strong>Players</strong>
            </div>
            {% for player in evento.players %}
            <div class="panel-block">{{ player }}</div>
            {% endfor %}
            <div class="panel-block">
              <button class="button is-success is-fullwidth">Join</button>
            </div>
          </div>
        </div>
        {% endfor %}
  </section>

</body>

</html>
