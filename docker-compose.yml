services:

  db:
    image: postgres:15.3
    ports:
      - "5432:5432"

  api:
    build:
      context: ./team_generator
      target: development
    depends_on:
      - db
    volumes:
      - ./team_generator:/code
    ports:
      - "8000:8000"

  nginx:
    image: nginx:1.23
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
